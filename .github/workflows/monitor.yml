name: Solana Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write # 必須有寫入權限才能更新 state.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}
          GITHUB_ACTIONS: true
        run: node monitor.js

      - name: Commit and Push State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          # 只有當檔案有變動時才 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update monitor state [skip ci]" && git push)