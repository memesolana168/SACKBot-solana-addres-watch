name: Solana Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 防止多個工作流同時執行，避免 Git 衝突與重複通知
concurrency:
  group: solana-monitor
  cancel-in-progress: false 

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史以利 rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}
          GITHUB_ACTIONS: true
        run: node monitor.js

      - name: Commit and Push State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          # 只有當檔案有變動時才 commit
          if ! git diff --quiet --staged data/state.json; then
            git commit -m "chore: update monitor state [skip ci]"
            # 使用 rebase 確保 push 成功，解決多工作流競爭問題
            git pull --rebase origin master
            git push origin master
          else
            echo "No changes in state.json"
          fi